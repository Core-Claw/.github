<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F1A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7C948;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4A90D9;stop-opacity:0.08" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.06" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Glow circle -->
  <circle cx="650" cy="100" r="120" fill="url(#glow)"/>
  <circle cx="650" cy="100" r="60" fill="url(#glow)"/>

  <!-- Claw icon (stylized) -->
  <g transform="translate(60, 55)" fill="url(#accent)">
    <!-- Simplified claw/claw-mark shape -->
    <path d="M0,0 L8,45 L16,0 L14,0 L8,38 L2,0 Z" opacity="0.9"/>
    <path d="M20,0 L28,50 L36,0 L34,0 L28,42 L22,0 Z" opacity="0.9"/>
    <path d="M40,0 L48,45 L56,0 L54,0 L48,38 L42,0 Z" opacity="0.9"/>
    <!-- Connecting arc -->
    <path d="M4,35 Q28,55 52,35" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.7"/>
  </g>

  <!-- Main title -->
  <text x="140" y="82" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">
    CoreClaw
  </text>

  <!-- Subtitle -->
  <text x="140" y="115" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#A0AEC0" letter-spacing="0.3">
    Web Scraping Platform &amp; Ready-Made Data Workers
  </text>

  <!-- Accent line -->
  <rect x="140" y="125" width="60" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="140" y="155" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#718096" letter-spacing="0.2">
    Build · Deploy · Monetize  100+ Workers · Python · Node.js · Go
  </text>

  <!-- Right side decorative data nodes -->
  <g transform="translate(580, 40)" opacity="0.35">
    <circle cx="0" cy="0" r="4" fill="#FF6B35"/>
    <circle cx="30" cy="20" r="3" fill="#4A90D9"/>
    <circle cx="60" cy="5" r="5" fill="#F7C948"/>
    <circle cx="15" cy="40" r="3" fill="#4A90D9"/>
    <circle cx="50" cy="35" r="4" fill="#FF6B35"/>
    <circle cx="80" cy="25" r="3" fill="#F7C948"/>
    <circle cx="90" cy="50" r="4" fill="#4A90D9"/>
    <circle cx="40" cy="60" r="3" fill="#FF6B35"/>
    <circle cx="70" cy="55" r="5" fill="#4A90D9"/>
    <circle cx="100" cy="40" r="3" fill="#F7C948"/>
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="30" y2="20" stroke="#FF6B35" stroke-width="0.8"/>
    <line x1="30" y1="20" x2="60" y2="5" stroke="#4A90D9" stroke-width="0.8"/>
    <line x1="30" y1="20" x2="15" y2="40" stroke="#4A90D9" stroke-width="0.8"/>
    <line x1="30" y1="20" x2="50" y2="35" stroke="#FF6B35" stroke-width="0.8"/>
    <line x1="60" y1="5" x2="80" y2="25" stroke="#F7C948" stroke-width="0.8"/>
    <line x1="50" y1="35" x2="80" y2="25" stroke="#FF6B35" stroke-width="0.8"/>
    <line x1="50" y1="35" x2="40" y2="60" stroke="#FF6B35" stroke-width="0.8"/>
    <line x1="80" y1="25" x2="90" y2="50" stroke="#4A90D9" stroke-width="0.8"/>
    <line x1="80" y1="25" x2="100" y2="40" stroke="#F7C948" stroke-width="0.8"/>
    <line x1="70" y1="55" x2="90" y2="50" stroke="#4A90D9" stroke-width="0.8"/>
    <line x1="70" y1="55" x2="40" y2="60" stroke="#4A90D9" stroke-width="0.8"/>
  </g>

  <!-- Bottom data nodes continued -->
  <g transform="translate(580, 100)" opacity="0.2">
    <circle cx="10" cy="70" r="3" fill="#4A90D9"/>
    <circle cx="55" cy="75" r="4" fill="#FF6B35"/>
    <circle cx="95" cy="65" r="3" fill="#F7C948"/>
    <line x1="40" y1="60" x2="10" y2="70" stroke="#4A90D9" stroke-width="0.6"/>
    <line x1="70" y1="55" x2="55" y2="75" stroke="#FF6B35" stroke-width="0.6"/>
    <line x1="100" y1="40" x2="95" y2="65" stroke="#F7C948" stroke-width="0.6"/>
  </g>
</svg>