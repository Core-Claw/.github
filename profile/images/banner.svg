<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#00E7D0"/>
<stop offset="100%" stop-color="#076BB7"/>
</linearGradient>
<linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#0a0f1a"/>
<stop offset="100%" stop-color="#0f172a"/>
</linearGradient>
<linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#00E7D0" stop-opacity="0"/>
<stop offset="50%" stop-color="#00E7D0" stop-opacity="0.5"/>
<stop offset="100%" stop-color="#076BB7" stop-opacity="0"/>
</linearGradient>
</defs>

<!-- Background -->
<rect width="1280" height="320" fill="url(#bgGrad)"/>

<!-- Subtle grid -->
<g opacity="0.04" stroke="#00E7D0" stroke-width="0.5">
<line x1="0" y1="80" x2="1280" y2="80"/>
<line x1="0" y1="160" x2="1280" y2="160"/>
<line x1="0" y1="240" x2="1280" y2="240"/>
<line x1="320" y1="0" x2="320" y2="320"/>
<line x1="640" y1="0" x2="640" y2="320"/>
<line x1="960" y1="0" x2="960" y2="320"/>
</g>

<!-- Left side - Minimal line art -->
<g transform="translate(100, 90)" opacity="0.6">
<!-- Abstract data flow lines -->
<path d="M0 70 L40 70 L60 30 L100 30" stroke="url(#brandGrad)" stroke-width="2" fill="none"/>
<path d="M0 90 L60 90 L80 50 L120 50" stroke="url(#brandGrad)" stroke-width="1.5" fill="none" opacity="0.7"/>
<path d="M20 110 L80 110 L100 70 L140 70" stroke="url(#brandGrad)" stroke-width="1" fill="none" opacity="0.5"/>
<!-- Endpoint dots -->
<circle cx="100" cy="30" r="3" fill="#00E7D0"/>
<circle cx="120" cy="50" r="2" fill="#00E7D0" opacity="0.7"/>
<circle cx="140" cy="70" r="2" fill="#00E7D0" opacity="0.5"/>
</g>

<!-- Main branding -->
<g transform="translate(480, 0)">
<text x="0" y="145" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-0.02em">CoreClaw</text>
<text x="2" y="190" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#94a3b8">Web Scraping Platform &amp; Ready-Made Data Workers</text>
<rect x="0" y="210" width="320" height="3" rx="1.5" fill="url(#brandGrad)"/>
</g>

<!-- Right side - Geometric line pattern -->
<g transform="translate(1000, 80)" opacity="0.5">
<path d="M0 0 L80 0 L80 80" stroke="url(#brandGrad)" stroke-width="2" fill="none"/>
<path d="M20 20 L80 20 L80 60" stroke="url(#brandGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
<path d="M40 40 L80 40" stroke="url(#brandGrad)" stroke-width="1" fill="none" opacity="0.4"/>
<path d="M0 160 L80 160 L80 80" stroke="#076BB7" stroke-width="2" fill="none" opacity="0.5"/>
</g>

<!-- Bottom accent lines -->
<line x1="0" y1="318" x2="500" y2="318" stroke="url(#lineGrad)" stroke-width="2"/>
<line x1="780" y1="318" x2="1280" y2="318" stroke="url(#lineGrad)" stroke-width="2"/>
</svg>